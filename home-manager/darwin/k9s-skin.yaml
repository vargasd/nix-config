# yaml-language-server: $schema=https://raw.githubusercontent.com/derailed/k9s/refs/heads/master/internal/config/json/schemas/skin.json

bg: &bg default
black: &black black
darkred: &darkred maroon
darkgreen: &darkgreen green
darkyellow: &darkyellow olive
darkblue: &darkblue navy
darkmagenta: &darkmagenta fuchsia
darkcyan: &darkcyan teal
gray: &gray silver
brightblack: &brightblack gray
red: &red red
green: &green lime
yellow: &yellow yellow
blue: &blue blue
magenta: &magenta purple
cyan: &cyan aqua
white: &white white

k9s:
  body:
    fgColor: *blue
    bgColor: *bg
    logoColor: *yellow

  help:
    fgColor: *gray
    bgColor: *bg
    keyColor: *cyan
    numKeyColor: *magenta
    sectionColor: *white

  prompt:
    fgColor: *blue
    bgColor: *bg
    suggestColor: *gray

  info:
    fgColor: *yellow
    sectionColor: *white
    memColor: *yellow
    cpuColor: *yellow
    k9sRevColor: *green

  dialog:
    fgColor: *blue
    bgColor: *bg
    buttonFgColor: *black
    buttonBgColor: *blue
    buttonFocusFgColor: *white
    buttonFocusBgColor: *cyan
    labelFgColor: *magenta
    fieldFgColor: *blue

  frame:
    border:
      fgColor: *brightblack
      focusColor: *darkgreen
      bgColor: *bg

    menu:
      fgColor: *white
      fgStyle: dim
      keyColor: *blue
      numKeyColor: *magenta

    crumbs:
      keyColor: *green
      fgColor: *black
      bgColor: *blue
      activeColor: *yellow

    status:
      newColor: *blue
      modifyColor: *yellow
      addColor: *white
      errorColor: *red
      pendingColor: *gray
      highlightColor: *cyan
      killColor: *darkred
      completedColor: *green

    title:
      bgColor: *bg
      fgColor: *cyan
      highlightColor: *magenta
      counterColor: *yellow
      filterColor: *blue

  views:
    charts:
      bgColor: *bg
      defaultDialColors:
        - *darkgreen
        - *darkred
      defaultChartColors:
        - *green
        - *red

    table:
      fgColor: *blue
      bgColor: *bg
      cursorFgColor: *white
      cursorBgColor: *brightblack
      markColor: *darkyellow
      header:
        fgColor: *white
        bgColor: *bg
        sorterColor: *yellow

    xray:
      fgColor: *blue
      bgColor: *bg
      cursorColor: *magenta
      graphicColor: *darkyellow
      showIcons: true

    yaml:
      keyColor: *blue
      colonColor: *white
      valueColor: *green

    logs:
      fgColor: *white
      bgColor: *bg
      indicator:
        fgColor: *blue
        bgColor: *bg
        toggleOnColor: *green
        toggleOffColor: *red
